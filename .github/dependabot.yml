version: 2
updates:
  # Aktualisiert die Versionen in den GitHub Actions Workflows (.github/workflows/)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "03:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "github-actions"
